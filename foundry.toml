[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.25"
optimizer = true
optimizer_runs = 200

# `--rpc-url zcore` resolves to the ZCore testnet RPC.
[rpc_endpoints]
zcore = "https://testnet.zcore.network/rpc"

# Lets `forge verify-contract ... --verifier blockscout --rpc-url zcore` verify on the ZCore explorer.
[etherscan]
zcore = { key = "any", url = "https://testnet.zcore.network/api?", chain = 92673 }
